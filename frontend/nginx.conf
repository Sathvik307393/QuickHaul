server {
    listen 80;

    # Serve the React static files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Forward API requests to the backend services
    # Auth Service uses an internal /auth prefix
    location /api/auth/ {
        proxy_pass http://auth_service:8002/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Other services use root-level routing
    location /api/locations/ {
        proxy_pass http://location_service:8001/;
        proxy_set_header Host $host;
    }

    location /api/bookings/ {
        proxy_pass http://booking_service:8003/;
        proxy_set_header Host $host;
    }

    location /api/notifications/ {
        proxy_pass http://notification_service:8004/;
        proxy_set_header Host $host;
    }

    location /api/otp/ {
        proxy_pass http://otp_service:8005/;
        proxy_set_header Host $host;
    }
}
