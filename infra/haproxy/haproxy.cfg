global
    log /dev/log local0
    log /dev/log local1 notice
    daemon

defaults
    log global
    mode http
    option httplog
    option dontlognull
    timeout connect 5000
    timeout client 50000
    timeout server 50000

frontend http-in
    bind *:80
    default_backend k8s-workers

backend k8s-workers
    balance roundrobin
    # Replace these with your Worker Node Private/Public IPs
    # The port 30080 is an example NodePort for KGateway
    server worker-1 <WORKER_1_IP>:30080 check
    server worker-2 <WORKER_2_IP>:30080 check
