# KGateway (Envoy-based Gateway API) Configuration
# This assumes KGateway is installed in your cluster.

apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: quick-haul-gateway
  namespace: quick-haul
spec:
  gatewayClassName: kgateway
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: Same
---
# Routing for Frontend
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
  namespace: quick-haul
spec:
  parentRefs:
  - name: quick-haul-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: frontend
      port: 80

---
# Routing for API Services
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: api-route
  namespace: quick-haul
spec:
  parentRefs:
  - name: quick-haul-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/location
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefix: /
    backendRefs:
    - name: location-service
      port: 8001
  - matches:
    - path:
        type: PathPrefix
        value: /api/auth
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefix: /
    backendRefs:
    - name: auth-service
      port: 8002
  - matches:
    - path:
        type: PathPrefix
        value: /api/booking
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefix: /
    backendRefs:
    - name: booking-service
      port: 8003
  - matches:
    - path:
        type: PathPrefix
        value: /api/notification
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefix: /
    backendRefs:
    - name: notification-service
      port: 8004
  - matches:
    - path:
        type: PathPrefix
        value: /api/otp
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefix: /
    backendRefs:
    - name: otp-service
      port: 8005
