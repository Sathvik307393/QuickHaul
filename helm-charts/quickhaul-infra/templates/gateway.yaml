apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: quickhaul-gateway
  namespace: quick-haul
spec:
  gatewayClassName: eg
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: Same
---
apiVersion: v1
kind: Service
metadata:
  name: envoy-gateway-nodeport
  namespace: envoy-gateway-system
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 10080
    nodePort: {{ .Values.global.nodePort }}
  selector:
    gateway.envoyproxy.io/owning-gateway-namespace: quick-haul
    gateway.envoyproxy.io/owning-gateway-name: quickhaul-gateway
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: auth-route
  namespace: quick-haul
spec:
  parentRefs:
  - name: quickhaul-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/auth
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /auth
    backendRefs:
    - name: auth-service
      port: 8002
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: booking-route
  namespace: quick-haul
spec:
  parentRefs:
  - name: quickhaul-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/booking
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: booking-service
      port: 8003
  - matches:
    - path:
        type: PathPrefix
        value: /api/bookings
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: booking-service
      port: 8003
---
