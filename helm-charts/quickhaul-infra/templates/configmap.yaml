apiVersion: v1
kind: ConfigMap
metadata:
  name: quick-haul-config
  namespace: quick-haul
data:
  MONGO_URI: "mongodb://mongodb:27017"
  REDIS_URL: "redis://redis:6379/0"
  AUTH_SERVICE_URL: "http://auth-service:8002"
  BOOKING_SERVICE_URL: "http://booking-service:8003"
  LOCATION_SERVICE_URL: "http://location-service:8001"
  NOTIFICATION_SERVICE_URL: "http://notification-service:8004"
  OTP_SERVICE_URL: "http://otp-service:8005"
  FRONTEND_URL: "http://frontend"
  # SMTP Settings
  SMTP_ENABLED: "true"
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_USERNAME: "sathviknbmath@gmail.com"
  SMTP_FROM_EMAIL: "sathviknbmath@gmail.com"
  SMTP_FROM_NAME: "Quick Haul Support"
  SMTP_USE_TLS: "false"
  SMTP_USE_STARTTLS: "true"
  # Vite environment variables for frontend
  VITE_AUTH_API_URL: "/auth"
  VITE_BOOKING_API_URL: "/booking"
  VITE_LOCATION_API_URL: "/location"
  VITE_NOTIFICATION_API_URL: "/notify"
  VITE_OTP_API_URL: "/otp"

