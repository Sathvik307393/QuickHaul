apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: notification-route
  namespace: quick-haul
spec:
  parentRefs:
  - name: quickhaul-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/notifications
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: notification-service
      port: 8004
