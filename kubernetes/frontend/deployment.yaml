apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: quick-haul
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: sathvik2003/quickhaul-frontend:v1
        ports:
        - containerPort: 80
        envFrom:
        - configMapRef:
            name: quick-haul-config
        - secretRef:
            name: quick-haul-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: quick-haul
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: frontend


