apiVersion: v1
kind: ConfigMap
metadata:
  name: quick-haul-config
  namespace: quick-haul
data:
  MONGO_URI: "mongodb://mongodb.quick-haul.svc.cluster.local:27017"
  REDIS_URL: "redis://redis.quick-haul.svc.cluster.local:6379/0"
  AUTH_SERVICE_URL: "http://auth-service.quick-haul.svc.cluster.local:8002"
  BOOKING_SERVICE_URL: "http://booking-service.quick-haul.svc.cluster.local:8003"
  LOCATION_SERVICE_URL: "http://location-service.quick-haul.svc.cluster.local:8001"
  NOTIFICATION_SERVICE_URL: "http://notification-service.quick-haul.svc.cluster.local:8004"
  OTP_SERVICE_URL: "http://otp-service.quick-haul.svc.cluster.local:8005"
  FRONTEND_URL: "http://frontend.quick-haul.svc.cluster.local"
  # Vite environment variables for frontend (matching Gateway routes)
  VITE_AUTH_API_URL: "/auth"
  VITE_BOOKING_API_URL: "/booking"
  VITE_LOCATION_API_URL: "/location"
  VITE_NOTIFICATION_API_URL: "/notify"
  VITE_OTP_API_URL: "/otp"
