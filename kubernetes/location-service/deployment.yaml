apiVersion: apps/v1
kind: Deployment
metadata:
  name: location-service
  namespace: quick-haul
spec:
  replicas: 1
  selector:
    matchLabels:
      app: location-service
  template:
    metadata:
      labels:
        app: location-service
    spec:
      containers:
      - name: location-service
        image: sathvik2003/quickhaul-location:v2`n
        ports:
        - containerPort: 8001
        envFrom:
        - configMapRef:
            name: quick-haul-config
        - secretRef:
            name: quick-haul-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: location-service
  namespace: quick-haul
spec:
  type: ClusterIP
  ports:
  - port: 8001
    targetPort: 8001
  selector:
    app: location-service




