apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: quick-haul
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: quickhaul/
        command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8002"]
        ports:
        - containerPort: 8002
        envFrom:
        - configMapRef:
            name: quick-haul-config
        - secretRef:
            name: quick-haul-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: quick-haul
spec:
  type: ClusterIP
  ports:
  - port: 8002
    targetPort: 8002
  selector:
    app: auth-service

