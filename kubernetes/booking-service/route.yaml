apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: booking-route
  namespace: quick-haul
spec:
  parentRefs:
  - name: quickhaul-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/bookings
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: booking-service
      port: 8003
